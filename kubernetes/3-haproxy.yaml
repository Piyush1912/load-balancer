apiVersion: v1
kind: ConfigMap
metadata:
  name: haproxy-config
data:
  haproxy.cfg: |
    global
      log stdout format raw local0
    defaults
      log global
      mode http
      timeout connect 5000ms
      timeout client 50000ms
      timeout server 50000ms
    resolvers kubernetes
      nameserver dns1 10.96.0.10:53
      resolve_retries 3
      timeout resolve 1s
      timeout retry   1s
      hold other      30s
      hold refused    30s
      hold nxdomain   30s
      hold timeout    30s
      hold valid      5s
      accepted_payload_size 8192
    frontend http_front
      bind *:80
      default_backend app_back
    backend app_back
      balance roundrobin
      server-template app- 3 app-headless-service.default.svc.cluster.local:8080 check resolvers kubernetes init-addr none 
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: haproxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: haproxy
  template:
    metadata:
      labels:
        app: haproxy
    spec:
      containers:
      - name: haproxy
        image: haproxy:latest
        ports:
        - containerPort: 80
        volumeMounts:
        - name: haproxy-config-volume
          mountPath: /usr/local/etc/haproxy/
      volumes:
      - name: haproxy-config-volume
        configMap:
          name: haproxy-config
---
apiVersion: v1
kind: Service
metadata:
  name: haproxy-service
spec:
  type: NodePort 
  selector:
    app: haproxy
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080